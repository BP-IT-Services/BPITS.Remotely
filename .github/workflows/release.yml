name: Release

on:
  workflow_dispatch:

jobs:
  build-agents:
    name: Build and Sign Agents
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Set up SSH agent for submodules
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Derive version from commit date
        shell: pwsh
        run: |
          $VersionString = git show -s --format=%ci
          $VersionDate = [DateTimeOffset]::Parse($VersionString)
          $CurrentVersion = $VersionDate.ToString("yyyy.MM.dd.HHmm")
          echo "VERSION=$CurrentVersion" >> $env:GITHUB_ENV

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install sign CLI
        run: dotnet tool install --global --prerelease sign

      - name: Run Publish.ps1
        shell: pwsh
        working-directory: Utilities
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          .\Publish.ps1 `
            -CurrentVersion $env:VERSION `
            -ArtifactSigningEndpoint "${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}" `
            -ArtifactSigningAccount "${{ secrets.ARTIFACT_SIGNING_ACCOUNT }}" `
            -ArtifactSigningCertificateProfile "${{ secrets.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}"

      - name: Upload agent content
        uses: actions/upload-artifact@v4
        with:
          name: wwwroot-content
          path: Server/wwwroot/Content/
          retention-days: 1

  build-server:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: build-agents

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Set up SSH agent for submodules
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Derive version from commit date
        run: |
          VERSION=$(git show -s --format='%cd' --date='format:%Y.%m.%d.%H%M')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download agent content
        uses: actions/download-artifact@v4
        with:
          name: wwwroot-content
          path: Server/wwwroot/Content/

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore Remotely.sln

      - name: Run Server tests
        run: dotnet test Tests/Server.Tests/Server.Tests.csproj --configuration Release --no-restore

      - name: Run Shared tests
        run: dotnet test Tests/Shared.Tests/Shared.Tests.csproj --configuration Release --no-restore

      - name: Build Server
        run: |
          dotnet build Server/Server.csproj \
            --runtime linux-x64 \
            --configuration Release \
            --self-contained

      - name: Publish Server
        run: |
          dotnet publish Server/Server.csproj \
            --runtime linux-x64 \
            --configuration Release \
            --self-contained \
            --output Server/bin/publish \
            --no-build \
            /p:Version=${{ env.VERSION }} \
            /p:FileVersion=${{ env.VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Server/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ env.VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
